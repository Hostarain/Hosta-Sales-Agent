server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: ${APP_NAME:jc-sales-agent}
  main:
    web-application-type: servlet
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

  # 数据源
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/SalesAgent}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # JPA
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    defer-datasource-initialization: true

# LangChain4j OpenAI 兼容接口
langchain4j:
  open-ai:
    chat-model:
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${LLM_API_KEY:}
      model-name: ${LLM_MODEL:qwen-max}
      temperature: 0.1
      max-tokens: 2048
    streaming-chat-model:
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${LLM_API_KEY:}
      model-name: ${LLM_MODEL:qwen-max}
      temperature: 0.1
      max-tokens: 2048

# Sa-Token 权限框架
sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 业务参数
sales-agent:
  tool:
    anomaly-threshold-days: ${ANOMALY_THRESHOLD_DAYS:5}
    trend-drop-threshold: ${TREND_DROP_THRESHOLD:0.3}

logging:
  level:
    com.jichi.salesAgent: ${LOG_LEVEL:DEBUG}
    dev.langchain4j: INFO

app:
  auth:
    enabled: ${AUTH_ENABLED:false}
