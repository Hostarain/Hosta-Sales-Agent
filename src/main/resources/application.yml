server:
  port: 8087

spring:
  application:
    name: hosta-sales-agent
  main:
    web-application-type: servlet
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  # 数据源
  datasource:
    url: jdbc:mysql://localhost:3306/SalesAgent
    username: root
    password: 121314
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # JPA
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    defer-datasource-initialization: true

# LangChain4j OpenAI 兼容接口（仅 API Key 走环境变量）
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${LLM_API_KEY}
      model-name: qwen-max
      temperature: 0.1
      max-tokens: 2048
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${LLM_API_KEY}
      model-name: qwen-max
      temperature: 0.1
      max-tokens: 2048

# Sa-Token 权限框架
sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 业务参数
sales-agent:
  tool:
    anomaly-threshold-days: 5
    trend-drop-threshold: 0.3

logging:
  level:
    com.jichi.salesAgent: DEBUG
    dev.langchain4j: INFO

app:
  auth:
    enabled: false
